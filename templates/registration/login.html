{% extends 'base.html' %}
{% block login %}
<div class="login-container" id="login-scene" style="cursor: none;">
    <!-- Interactive Background Elements -->
    <canvas id="login-canvas"></canvas>
    <!-- The "Spotlight" Cursor -->
    <div id="mouse-spotlight" style="position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0.05) 40%, transparent 70%); pointer-events: none; z-index: 2; border-radius: 50%; transform: translate(-50%, -50%); transition: opacity 0.3s;"></div>
    
    <div class="login-card" id="static-card">
        <div class="logo" style="margin-bottom: 12px; font-size: 38px; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">NexusTracker</div>
        <p style="color: var(--text-muted); margin-bottom: 32px; font-weight: 500; letter-spacing: 0.5px;">ENTERPRISE BUG TRACKING SOLUTION</p>
        
        <!-- Only show errors if a POST request was actually made -->
        {% if request.method == 'POST' and form.errors %}
        <div class="login-error">
            <span style="font-size: 18px; font-weight: bold;">!</span> Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-input" required placeholder="Enter username">
            </div>
            <div class="form-group" style="margin-bottom: 32px;">
                <label>Password</label>
                <input type="password" name="password" class="form-input" required placeholder="Password">
            </div>
            <button type="submit" class="btn btn-primary" style="padding: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;">Secure Login</button>
        </form>
        
        <div style="margin-top: 32px; font-size: 11px; color: rgba(255,255,255,0.2); text-transform: uppercase; letter-spacing: 2px;">
            Certified AI-Powered Environment
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const spotlight = document.getElementById('mouse-spotlight');
    const canvas = document.getElementById('login-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    // 1. Spotlight Tracking
    document.addEventListener('mousemove', (e) => {
        spotlight.style.left = e.clientX + 'px';
        spotlight.style.top = e.clientY + 'px';
        spotlight.style.opacity = '1';
    });

    document.addEventListener('mouseleave', () => {
        spotlight.style.opacity = '0';
    });

    // 2. Optimized Particle Constellation
    let particles = [];
    function initParticles() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<70; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                size: Math.random() * 1.2 + 0.5
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(59, 130, 246, 0.4)';
        ctx.strokeStyle = 'rgba(59, 130, 246, 0.08)';
        ctx.lineWidth = 0.5;

        particles.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;

            if(p.x < 0) p.x = canvas.width;
            if(p.x > canvas.width) p.x = 0;
            if(p.y < 0) p.y = canvas.height;
            if(p.y > canvas.height) p.y = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();

            for(let j=i+1; j<particles.length; j++) {
                const p2 = particles[j];
                const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                if(dist < 130) {
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            }
        });
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', initParticles);
    initParticles();
    animate();
});
</script>
{% endblock %}
