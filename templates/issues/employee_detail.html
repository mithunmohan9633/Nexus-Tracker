{% extends 'base.html' %}
{% block content %}
<div style="margin-bottom: 24px;">
    <a href="{% url 'hr_dashboard' %}" class="btn" style="background:var(--bg-card); display: inline-block; margin-bottom: 24px;">&larr; Back to Directory</a>
    
    <div style="background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); padding: 40px; max-width: 800px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px;">
            <div>
                <h1 style="margin: 0 0 8px 0;">{{ profile.full_name|default:target_user.username }}</h1>
                <p style="color: var(--text-muted); font-size: 16px;">Employee Profile • {{ profile.get_role_display }}</p>
            </div>
            <button id="edit-btn" onclick="enableEdit()" class="btn btn-primary" style="width: auto; padding: 10px 24px;">Edit Profile</button>
        </div>

        <form id="editForm" method="post">
            {% csrf_token %}
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" value="{{ profile.full_name|default:'' }}" class="form-input" readonly required id="field-full-name">
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" name="mobile_number" value="{{ profile.mobile_number|default:'' }}" class="form-input" readonly required id="field-mobile">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" value="{{ target_user.email }}" class="form-input" readonly required id="field-email">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select name="role" class="form-input" disabled id="field-role">
                        {% for code, label in profile.ROLE_CHOICES %}
                        <option value="{{ code }}" {% if profile.role == code %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div id="save-actions" style="display: none; margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border); gap: 12px; justify-content: flex-end;">
                <button type="button" onclick="window.location.reload()" class="btn" style="width: auto; background: transparent; border: 1px solid var(--border);">Cancel</button>
                <button type="button" onclick="openConfirmModal()" class="btn btn-primary" style="width: auto; background: var(--accent-green);">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<!-- Custom Confirmation Modal -->
<div id="confirmModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(4px); z-index:10000; align-items:center; justify-content:center;">
    <div style="background:var(--bg-card); width:100%; max-width:400px; padding:32px; border-radius:24px; border:1px solid var(--border); text-align:center;">
        <h3 style="margin-bottom:12px; font-size:20px;">Save Changes?</h3>
        <p style="color:var(--text-muted); margin-bottom:32px;">Are you sure you want to edit the details for this employee?</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <button onclick="closeConfirmModal()" class="btn" style="background:var(--bg-dark); border:1px solid var(--border);">No, Cancel</button>
            <button onclick="submitForm()" class="btn btn-primary" style="background:var(--accent-green);">Yes, Save</button>
        </div>
    </div>
</div>

<script>
function enableEdit() {
    const fields = ['field-full-name', 'field-mobile', 'field-email', 'field-role'];
    fields.forEach(id => {
        const el = document.getElementById(id);
        el.removeAttribute('readonly');
        el.removeAttribute('disabled');
        el.style.borderColor = 'var(--accent-blue)';
    });
    document.getElementById('edit-btn').style.display = 'none';
    document.getElementById('save-actions').style.display = 'flex';
}

function openConfirmModal() {
    document.getElementById('confirmModal').style.display = 'flex';
}

function closeConfirmModal() {
    document.getElementById('confirmModal').style.display = 'none';
}

function submitForm() {
    document.getElementById('editForm').submit();
}
</script>
{% endblock %}
