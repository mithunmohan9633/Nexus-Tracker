{% extends 'base.html' %}
{% block content %}
<div style="margin-bottom: 24px;">
    <a href="{% url 'inbox' %}" class="btn" style="background:var(--bg-card); margin-bottom: 16px; display: inline-block;">Back to Inbox</a>
    <div style="background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px;">
        <h2 style="margin-top:0;">{{ msg.subject }}</h2>
        <div style="color:var(--text-muted); margin-bottom:16px;">
            From: {{ msg.sender.username|default:"System" }}
            {% if msg.project %} | Project: {{ msg.project.name }}{% endif %}
        </div>
        <hr style="border:0; border-top:1px solid var(--border); margin-bottom:16px;">
        <div style="white-space: pre-wrap;">{{ msg.body }}</div>
        {% if msg.sender %}
        <div style="margin-top: 32px;"><a href="{% url 'compose_message' %}?to={{ msg.sender.pk }}" class="btn btn-primary">Reply</a></div>
        {% endif %}
    </div>
</div>
{% endblock %}
